services:
  - type: web
    name: barbearia-app
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    healthCheckPath: /api/health
    disk:
      name: barbearia-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: DATA_PATH
        value: /var/data/store.json
      - key: FIREBASE_WEB_API_KEY
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: FIREBASE_STORE_COLLECTION
        value: barbeariaApp
      - key: FIREBASE_STORE_DOC
        value: store
      - key: FIREBASE_WEB_AUTH_DOMAIN
        sync: false
      - key: FIREBASE_WEB_PROJECT_ID
        sync: false
      - key: FIREBASE_WEB_APP_ID
        sync: false
      - key: FIREBASE_WEB_GOOGLE_CLIENT_ID
        sync: false
